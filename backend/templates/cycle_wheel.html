{% extends "base.html" %}

{% block content %}

<h2>Cycle Phase Education 🌸</h2>

<div class="wheel">
    <button onclick="loadPhase('menstrual')">Menstrual</button>
    <button onclick="loadPhase('follicular')">Follicular</button>
    <button onclick="loadPhase('ovulation')">Ovulation</button>
    <button onclick="loadPhase('luteal')">Luteal</button>
</div>

<div id="info" class="info-card"></div>

<script>
function loadPhase(phase) {
    fetch(`/cycle-info/${phase}`)
        .then(res => res.json())
        .then(data => {
            document.getElementById("info").innerHTML = `
                <h3>${data.title}</h3>
                <p><strong>Body:</strong> ${data.body}</p>
                <p><strong>Mood:</strong> ${data.mood}</p>
                <p><strong>Food:</strong> ${data.food}</p>
                <p><strong>Exercise:</strong> ${data.exercise}</p>
            `;
        });
}
</script>

{% endblock %}
